<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>వడ్డీ క్యాలిక్యులేటర్</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Noto Sans Telugu', sans-serif;
            background-color: #fcfcfc;
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white p-6 md:p-8 rounded-3xl shadow-xs border border-gray-100 space-y-8">
        
        <!-- Minimal Header -->
        <div class="text-center">
            <h1 class="text-2xl font-bold text-gray-900">వడ్డీ క్యాలిక్యులేటర్</h1>
            <p class="text-gray-400 text-xs mt-1">నెలవారీ నూటికి రూపాయిల లెక్క</p>
        </div>

        <!-- Input Fields -->
        <div class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">అసలు సొమ్ము (₹)</label>
                <input type="number" id="principal" value="100000" oninput="calculate()" class="w-full px-4 py-3 bg-gray-50 rounded-xl focus:outline-hidden focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all font-semibold text-lg">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">నెలవారీ వడ్డీ రేటు (నూటికి)</label>
                <div class="relative">
                    <input type="number" id="rate" value="2" step="0.25" oninput="calculate()" class="w-full px-4 py-3 bg-gray-50 rounded-xl focus:outline-hidden focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all font-semibold text-lg">
                    <span class="absolute inset-y-0 right-4 flex items-center text-gray-400 text-sm font-medium">రూపాయలు</span>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">కాలపరిమితి (మొత్తం నెలలు)</label>
                <input type="number" id="months" value="12" min="1" oninput="calculate()" class="w-full px-4 py-3 bg-gray-50 rounded-xl focus:outline-hidden focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all font-semibold text-lg">
            </div>
        </div>

        <hr class="border-gray-100">

        <!-- Minimal Clean Results -->
        <div class="space-y-4">
            <div class="flex justify-between items-center">
                <span class="text-sm text-gray-500">కేవలం వడ్డీ మాత్రమే:</span>
                <span class="text-xl font-bold text-gray-900">₹ <span id="resInterest">0</span></span>
            </div>
            
            <div class="flex justify-between items-center bg-emerald-50/60 p-4 rounded-xl">
                <span class="text-sm font-semibold text-emerald-800">మొత్తం సొమ్ము (అసలు + వడ్డీ):</span>
                <span class="text-2xl font-black text-emerald-700">₹ <span id="resTotal">0</span></span>
            </div>
        </div>

    </div>

    <script>
        function calculate() {
            const p = parseFloat(document.getElementById('principal').value) || 0;
            const r = parseFloat(document.getElementById('rate').value) || 0;
            const m = parseInt(document.getElementById('months').value) || 0;

            // Pure traditional local interest calculation logic
            const interest = (p * r * m) / 100;
            const total = p + interest;

            document.getElementById('resInterest').innerText = Math.round(interest).toLocaleString('en-IN');
            document.getElementById('resTotal').innerText = Math.round(total).toLocaleString('en-IN');
        }

        // Run calculation on page load
        window.onload = calculate;
    </script>
</body>
</html>
